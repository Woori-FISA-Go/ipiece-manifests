receivers:
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}
      load: {}

  filelog:
    include:
      - /var/log/syslog
      - /var/log/messages
      - /var/log/*.log
    exclude:
      - /var/log/*.gz
      - /var/log/*.zip
      - /var/log/*.tar
      - /var/log/*.1
    start_at: end
    include_file_path: true
    include_file_name: true

processors:
  resource:
    attributes:
      - key: service.name
        action: upsert
        value: ${env:HOSTNAME}
      - key: service.instance.id
        action: upsert
        value: ${env:HOSTNAME}
      - key: host_name
        action: upsert
        value: ${env:HOSTNAME}

  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlphttp:
    endpoint: "http://k8s-monitori-ipiecemo-bc1bd31ce0-4869417592d8547d.elb.ap-northeast-2.amazonaws.com:4318"
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [hostmetrics]
      processors: [resource, batch]
      exporters: [otlphttp]

    logs:
      receivers: [filelog]
      processors: [resource, batch]
      exporters: [otlphttp]
