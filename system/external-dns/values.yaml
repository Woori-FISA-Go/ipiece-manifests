external-dns:
  provider: aws
  aws:
    region: ap-northeast-2
    zoneType: public
  
  # 변경하려는 도메인만 필터링 (안전장치)
  domainFilters:
    - ipiece.store

  # 레코드 소유자 ID (여러 ExternalDNS가 있을 때 충돌 방지)
  txtOwnerId: ipiece-cluster1

  # 실제 레코드를 생성하는 방식 (sync: 생성/삭제 모두 허용)
  policy: sync

  serviceAccount:
    create: true
    name: external-dns
    # 🔥 1단계에서 만든 IAM Role ARN을 여기에 입력
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::235625001959:role/ipiece-external-dns-role