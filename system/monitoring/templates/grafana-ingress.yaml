apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    # ALB 사용
    kubernetes.io/ingress.class: alb

    # 🔒 VPC 내부 전용 ALB (인터넷에서 직접 접근 불가)
    alb.ingress.kubernetes.io/scheme: internal

    alb.ingress.kubernetes.io/target-type: ip

    # 👉 내부용이니까 그냥 HTTP만 열어도 충분 (원하면 HTTPS도 나중에 추가 가능)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'

    alb.ingress.kubernetes.io/group.name: ipiece-monitoring
    alb.ingress.kubernetes.io/healthcheck-path: /api/health

    # ❌ 외부 도메인 붙일 필요 없음 (그래도 쓰고 싶으면 나중에 다시 추가)
    # external-dns.alpha.kubernetes.io/hostname: grafana.ipiece.store

    # ❌ 퍼블릭 인증서도 필요 없음 (ALB에서 HTTPS 안 쓸 거라)
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: ipiece-monitoring-grafana
                port:
                  number: 80
