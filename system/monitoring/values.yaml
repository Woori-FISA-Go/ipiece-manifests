# ==========================================
# 1. Prometheus (硫뷀듃由???μ냼 - EBS ?ъ슜)
# ==========================================
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      # OTel remote write 諛쏄린
      enableRemoteWriteReceiver: true
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      resources:
        requests:
          memory: 1Gi
        limits:
          memory: 2Gi

  grafana:
    enabled: true
    adminPassword: "admin"
    persistence:
      enabled: true
      storageClassName: gp2
      size: 10Gi

    # ?뵦 Grafana?먯꽌 Loki瑜?湲곕낯 ?곗씠?곗냼?ㅻ줈 遺숈씠湲?
    additionalDataSources:
      - name: Loki
        type: loki
        # CHANGED: Loki ?쒕퉬???대쫫??ipiece-loki 濡?怨좎젙 (?꾨옒 loki-stack ?ㅼ젙怨?留ㅼ묶)
        url: http://ipiece-loki:3100/
        access: proxy

    # /grafana ?쒕툕?⑥뒪濡??몄텧
    env:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  nodeExporter:
    enabled: false

# ==========================================
# 2. Loki (濡쒓렇 ??μ냼 - S3 ?ъ슜)
# ==========================================
loki-stack:
  promtail:
    enabled: false

  loki:
    enabled: true
    isDefault: false

    # CHANGED: Loki 由ъ냼???대쫫??ipiece-loki 濡?怨좎젙
    # => Service ?대쫫??ipiece-loki (port 3100) ?쇰줈 ?앷?
    fullnameOverride: ipiece-loki

    config:
      auth_enabled: false
      schema_config:
        configs:
          - from: 2024-01-01
            store: boltdb-shipper
            object_store: s3
            schema: v11
            index:
              prefix: index_
              period: 24h

      storage_config:
        aws:
          # CHANGED: ?ㅼ젣 S3 踰꾪궥 寃쎈줈 ?뺥깭濡??섏젙
          #   - Region? ?꾨옒 region ?꾨뱶?먯꽌 吏??
          #   - 踰꾪궥 ?대쫫??ipiece-loki-store ?쇨퀬 ?덉쑝???대젃寃??먮뒗寃??쇰컲??
          s3: s3://ipiece-loki-store
          region: ap-northeast-2

    extraEnv:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_SECRET_ACCESS_KEY

    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: s3
      retention_enabled: true

    limits_config:
      retention_period: 30d

# ==========================================
# 3. OTel Collector (EKS ?대? ?섏쭛??
# ==========================================
otel:
  mode: daemonset

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.91.0"

  # ?섍꼍蹂???ㅼ젙
  extraEnvs:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: K8S_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace

  # 蹂쇰ⅷ 留덉슫??(濡쒓렇 ?섏쭛??
  extraVolumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  extraVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

  config:
    receivers:
      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem: {}
          network: {}
          load: {}

      kubeletstats:
        auth_type: "serviceAccount"
        endpoint: "${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        collection_interval: 10s
        metric_groups:
          - node
          - pod

      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/monitoring_*/*/*.log
        start_at: beginning
        include_file_path: true
        include_file_name: false
        operators:
          - type: router
            id: get-format
            routes:
              - output: parser-docker
                expr: 'body matches "^\\{"'
              - output: parser-containerd
                expr: 'body matches "^[^ Z]+ "'
          - type: regex_parser
            id: parser-containerd
            regex: "^(?P<time>[^ ^Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: "%Y-%m-%dT%H:%M:%S.%LZ"
          - type: json_parser
            id: parser-docker
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: "%Y-%m-%dT%H:%M:%S.%LZ"
          - type: regex_parser
            id: extract_metadata_from_filepath
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]{36})\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$'
            parse_from: attributes["log.file.path"]

      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024

      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name

      resourcedetection:
        detectors: [env, system]

    exporters:
      # CHANGED: Prometheus remote write ?붾뱶?ъ씤?몃?
      #   kube-prometheus-stack媛 ?대??먯꽌 留뚮뱶??怨좎젙 ?쒕퉬?ㅼ씤
      #   prometheus-operated 濡??곌껐
      #
      # ???쒕퉬?ㅻ뒗 kube-prometheus-stack ?ㅼ튂 ????긽 媛숈씠 ?앷린怨?
      # remote write receiver???ш린???대젮 ?덉쓬.
      prometheusremotewrite:
        endpoint: "http://prometheus-operated.monitoring:9090/api/v1/write"
        tls:
          insecure: true

      # CHANGED: Loki ?붾뱶?ъ씤?몃? ?곕━媛 fullnameOverride濡?怨좎젙??
      #   ipiece-loki ?쒕퉬?ㅻ줈 ?곌껐
      otlphttp/loki:
        endpoint: "http://ipiece-loki.monitoring:3100/otlp"
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [hostmetrics, kubeletstats, otlp]
          processors: [k8sattributes, batch, resourcedetection]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [filelog]
          processors: [k8sattributes, batch, resourcedetection]
          exporters: [otlphttp/loki]

  serviceAccount:
    create: true

  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources:
          [
            "nodes",
            "nodes/stats",
            "services",
            "endpoints",
            "pods",
            "namespaces",
            "nodes/proxy",
          ]
        verbs: ["get", "watch", "list"]
      - apiGroups: ["apps"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["extensions"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]

