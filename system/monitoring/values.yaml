# system/monitoring/values.yaml

# ==========================================
# 1. Prometheus (메트릭 저장 - EBS 사용)
# ==========================================
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      # OTel remote write 활성화
      enableRemoteWriteReceiver: true
      retention: 15d

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

      resources:
        requests:
          memory: 1Gi
        limits:
          memory: 2Gi

  grafana:
    enabled: true
    adminPassword: "admin"

    grafana.ini:
      security:
        allow_embedding: true
      public_dashboards:
        enabled: true
      auth.anonymous:
        enabled: true
        org_role: Viewer

    persistence:
      enabled: true
      storageClassName: gp2
      size: 10Gi

    # 기본 Grafana에서 Loki 데이터 소스를 자동 설정
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://ipiece-loki:3100/
        access: proxy

    # Grafana를 /grafana 경로에서 서비스
    env:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  nodeExporter:
    enabled: false

# ==========================================
# 2. Loki (로그 저장 - S3 사용, Loki 2.x 기준)
# ==========================================
loki-stack:
  promtail:
    enabled: false

  loki:
    enabled: true
    isDefault: false

    # Loki 서비스명을 ipiece-loki로 고정
    fullnameOverride: ipiece-loki

    config:
      auth_enabled: false

      schema_config:
        configs:
          - from: 2024-01-01
            store: boltdb-shipper
            object_store: s3
            schema: v11
            index:
              prefix: index_
              period: 24h

      # ⚠ Loki 2.x + boltdb-shipper + AWS S3 설정
      #   - s3 URL 형식: s3://<region>/<bucket>
      storage_config:
        aws:
          s3: s3://ap-northeast-2/ipiece-loki-store
          region: ap-northeast-2

    extraEnv:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_SECRET_ACCESS_KEY

    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: s3
      retention_enabled: true

    limits_config:
      retention_period: 30d

# ==========================================
# 3. OTel Collector (EKS 로그/메트릭 수집)
# ==========================================
otel:
  mode: daemonset

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.91.0"

  # Pod/Node 메타데이터 환경 변수 설정
  extraEnvs:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: K8S_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace

  # 로그 파일 경로 마운트
  extraVolumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  extraVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

  # OTEL Collector Pipeline 설정
  config:
    receivers:
      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem: {}
          network: {}
          load: {}

      kubeletstats:
        auth_type: "serviceAccount"
        endpoint: "${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        collection_interval: 10s
        metric_groups:
          - node
          - pod

      filelog:
        include:
          - /var/log/pods/*/*/*.log
        # 자기 자신(otel) 로그는 제외해서 루프 방지
        exclude:
          - /var/log/pods/monitoring_ipiece-monitoring-otel-agent_*/*.log
        start_at: beginning
        include_file_path: true
        include_file_name: false

        operators:
          # 1) 어떤 포맷인지 먼저 라우팅
          - id: get-format
            type: router
            routes:
              - output: parser-docker
                expr: 'body matches "^\\{"'
              - output: parser-containerd
                expr: 'body matches "^[^ Z]+ "'

          # 2) containerd / cri-o 같이 text 형태
          - id: parser-containerd
            type: regex_parser
            regex: "^(?P<time>[^ ^Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: "%Y-%m-%dT%H:%M:%S.%LZ"

          # 3) docker json 로그
          - id: parser-docker
            type: json_parser
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: "%Y-%m-%dT%H:%M:%S.%LZ"

          # 4) 파일 경로에서 namespace/pod/uid 등 추출
          #    (pod_name, container_name 은 . / - / _ 등 허용하려고 .+ 로 완화)
          - id: extract_metadata_from_filepath
            type: regex_parser
            parse_from: attributes["log.file.path"]
            regex: '^.*/(?P<namespace>[^_]+)_(?P<pod_name>.+)_(?P<pod_uid>[a-f0-9\-]{36})/(?P<container_name>.+)/(?P<restart_count>\d+)\.log$'

          # 5) 추출한 속성을 k8s.* 표준 리소스 속성으로 이동
          - id: move-namespace
            type: move
            from: attributes["namespace"]
            to: resource["k8s.namespace.name"]
          - id: move-pod-name
            type: move
            from: attributes["pod_name"]
            to: resource["k8s.pod.name"]
          - id: move-pod-uid
            type: move
            from: attributes["pod_uid"]
            to: resource["k8s.pod.uid"]
          - id: move-container-name
            type: move
            from: attributes["container_name"]
            to: resource["k8s.container.name"]
          - id: move-restart-count
            type: move
            from: attributes["restart_count"]
            to: resource["k8s.container.restart_count"]

      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024

      # logs에서 Pod를 어떻게 찾을지 pod_association 추가
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid

      resourcedetection:
        detectors: [env, system]

    exporters:
      # 메트릭 → Prometheus
      prometheusremotewrite:
        endpoint: "http://prometheus-operated.monitoring:9090/api/v1/write"
        tls:
          insecure: true

      # 로그 → Loki (Loki 2.x: OTLP 엔드포인트 말고 Push API 사용)
      loki:
        endpoint: "http://ipiece-loki.monitoring:3100/loki/api/v1/push"
        tls:
          insecure: true

      # 디버깅용 – 에이전트가 어떤 로그 레코드를 만들었는지 stdout에 찍기
      debug/logs:
        verbosity: detailed

    service:
      pipelines:
        metrics:
          receivers: [hostmetrics, kubeletstats, otlp]
          processors: [k8sattributes, batch, resourcedetection]
          exporters: [prometheusremotewrite]

        logs:
          receivers: [filelog, otlp]
          processors: [k8sattributes, batch, resourcedetection]
          exporters: [loki, debug/logs]

  serviceAccount:
    create: true

  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["nodes", "nodes/stats", "services", "endpoints", "pods", "namespaces", "nodes/proxy"]
        verbs: ["get", "watch", "list"]
      - apiGroups: ["apps"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["extensions"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
