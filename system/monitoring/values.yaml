# ==========================================
# 1. Prometheus + Grafana
# ==========================================
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      retention: 15d

      # DaemonSet OTel Agent → Prometheus Pull
      scrapeConfigs:
        - job_name: "otel-agent"
          metrics_path: /metrics
          static_configs:
            - targets:
                - "ipiece-otel-agent.monitoring.svc.cluster.local:8888"

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

  grafana:
    enabled: true
    replicaCount: 1
    adminPassword: "admin"

    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s/grafana/"
        serve_from_sub_path: true
      security:
        allow_embedding: true
      public_dashboards:
        enabled: true
      auth.anonymous:
        enabled: true
        org_role: Viewer

    persistence:
      enabled: true
      storageClassName: gp2
      size: 10Gi

    additionalDataSources:
      - name: Loki
        type: loki
        url: http://ipiece-loki:3100/
        access: proxy

  nodeExporter:
    enabled: true



# ==========================================
# 2. Loki (S3 연동)
# ==========================================
loki-stack:
  promtail:
    enabled: false

  loki:
    enabled: true
    isDefault: false
    fullnameOverride: ipiece-loki

    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_SECRET_ACCESS_KEY

    config:
      auth_enabled: false

      server:
        http_listen_port: 3100
        grpc_listen_port: 9095

      memberlist:
        join_members:
          - ipiece-loki-memberlist.monitoring.svc.cluster.local

      ingester:
        lifecycler:
          ring:
            kvstore:
              store: memberlist
            replication_factor: 1
          final_sleep: 0s
        chunk_idle_period: 3m
        chunk_retain_period: 1m
        max_transfer_retries: 0

      schema_config:
        configs:
          - from: 2024-01-01
            store: boltdb-shipper
            object_store: s3
            schema: v11
            index:
              prefix: index_
              period: 24h

      storage_config:
        aws:
          bucketnames: ipiece-loki-store
          endpoint: s3.ap-northeast-2.amazonaws.com
          region: ap-northeast-2
          s3forcepathstyle: false
          insecure: false

        boltdb_shipper:
          shared_store: s3
          active_index_directory: /data/loki/index
          cache_location: /data/loki/index_cache

      compactor:
        working_directory: /data/loki/boltdb-shipper-compactor
        shared_store: s3
        retention_enabled: true

      limits_config:
        retention_period: 30d
        ingestion_rate_mb: 10
        ingestion_burst_size_mb: 20




# ==========================================
# 3. OTel Collector AGENT (DaemonSet)
# ==========================================
otel:
  mode: daemonset
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.91.0"

  extraEnvs:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: K8S_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace

  extraVolumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  extraVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

  config:
    receivers:
      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem: {}
          network: {}
          load: {}

      kubeletstats:
        auth_type: "serviceAccount"
        endpoint: "${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        collection_interval: 10s
        metric_groups: [node, pod]

      k8s_events:
        auth_type: "serviceAccount"
        namespaces: [default, monitoring, ipiece-frontend-prod]

      filelog:
        include:
          - /var/log/pods/*/*/*.log
        include_file_path: true
        include_file_name: false
        start_at: end

        multiline:
          line_start_pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}"

        operators:
          - id: parser-cri
            type: regex_parser
            regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'

          - id: extract_metadata_from_filepath
            type: regex_parser
            parse_from: attributes["log.file.path"]
            regex: '^.*/(?P<namespace>[^_]+)_(?P<pod_name>.+)_(?P<pod_uid>[a-f0-9\-]{36})/(?P<container_name>.+)/(?P<restart_count>\d+)\.log$'

          - id: move-namespace
            type: move
            from: attributes["namespace"]
            to: resource["k8s.namespace.name"]

          - id: move-pod-name
            type: move
            from: attributes["pod_name"]
            to: resource["k8s.pod.name"]

          - id: move-pod-uid
            type: move
            from: attributes["pod_uid"]
            to: resource["k8s.pod.uid"]

          - id: move-container-name
            type: move
            from: attributes["container_name"]
            to: resource["k8s.container.name"]

          - id: move-restart-count
            type: move
            from: attributes["restart_count"]
            to: resource["k8s.container.restart_count"]

          - id: clean-up-body
            type: move
            from: attributes["log"]
            to: body

      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 450
        spike_limit_mib: 128

      batch:
        timeout: 5s
        send_batch_size: 1024

      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid

      resourcedetection:
        detectors: [env, system, ec2]

      resource:
        attributes:
          - key: loki.resource.labels
            action: insert
            value: k8s.namespace.name, k8s.pod.name, k8s.container.name, k8s.node.name, cloud.availability_zone

    exporters:
      loki:
        endpoint: "http://ipiece-loki.monitoring:3100/loki/api/v1/push"
        tls:
          insecure: true

    service:
      pipelines:
        logs:
          receivers: [filelog, otlp, k8s_events]
          processors: [memory_limiter, k8sattributes, resource, batch, resourcedetection]
          exporters: [loki]

  serviceAccount:
    create: true

  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["nodes", "nodes/stats", "pods", "namespaces", "nodes/proxy", "events"]
        verbs: ["get", "watch", "list"]
      - apiGroups: ["apps"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["extensions"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]




# ==========================================
# 4. OTel Collector GATEWAY (Java OTLP)
# ==========================================
otel-collector-gateway:
  enabled: true
  mode: deployment

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.91.0"

  service:
    type: ClusterIP
    ports:
      otlp-grpc: 4317
      otlp-http: 4318

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s

    exporters:
      loki:
        endpoint: "http://ipiece-loki.monitoring:3100/loki/api/v1/push"
        tls:
          insecure: true

      prometheusremotewrite:
        endpoint: "http://prometheus-operated.monitoring:9090/api/v1/write"
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite]

        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [loki]

        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: []
