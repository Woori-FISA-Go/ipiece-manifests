# system/monitoring/values.yaml

# ==========================================
# 1. Prometheus (메트릭 저장 - EBS 사용)
# ==========================================
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      resources:
        requests:
          memory: 1Gi
        limits:
          memory: 2Gi

  grafana:
    enabled: true
    adminPassword: "admin"
    grafana.ini:
      security:
        allow_embedding: true
      public_dashboards:
        enabled: true
      auth.anonymous:
        enabled: true
        org_role: Viewer
    persistence:
      enabled: true
      storageClassName: gp2
      size: 10Gi
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://ipiece-loki:3100/
        access: proxy
    env:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  nodeExporter:
    enabled: false

# ==========================================
# 2. Loki (로그 저장 - S3 사용, Loki 2.x)
# ==========================================
loki-stack:
  promtail:
    enabled: false

  loki:
    enabled: true
    isDefault: false
    fullnameOverride: ipiece-loki

    config:
      auth_enabled: false

      schema_config:
        configs:
          - from: 2024-01-01
            store: boltdb-shipper
            object_store: s3
            schema: v11
            index:
              prefix: index_
              period: 24h

      # 🔥 S3 설정 (버킷 이름/엔드포인트 명시)
      storage_config:
        aws:
          bucketnames: ipiece-loki-store
          endpoint: s3.ap-northeast-2.amazonaws.com
          region: ap-northeast-2
          s3forcepathstyle: false
          insecure: false

    extraEnv:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_SECRET_ACCESS_KEY

    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: s3
      retention_enabled: true

    limits_config:
      retention_period: 30d

# ==========================================
# 3. OTel Collector (EKS 로그/메트릭 + 온프레 OTLP 수집)
# ==========================================
otel:
  mode: daemonset
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.91.0"

  extraEnvs:
    - name: K8S_NODE_NAME
      valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
    - name: K8S_POD_NAME
      valueFrom: { fieldRef: { fieldPath: metadata.name } }
    - name: K8S_NAMESPACE
      valueFrom: { fieldRef: { fieldPath: metadata.namespace } }

  extraVolumes:
    - name: varlog
      hostPath: { path: /var/log }
    - name: varlibdockercontainers
      hostPath: { path: /var/lib/docker/containers }

  extraVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

  config:
    receivers:
      # ✅ EKS 노드 메트릭 수집 (CPU/Memory 등)
      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem: {}
          network: {}
          load: {}

      kubeletstats:
        auth_type: "serviceAccount"
        endpoint: "${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        collection_interval: 10s
        metric_groups: [node, pod]

      filelog:
        include:
          - /var/log/pods/*/*/*.log

        # ✅ 자기 자신(otel) 로그는 제외해서 루프 방지
        # /var/log/pods/monitoring_ipiece-monitoring-otel-agent-XXXXX_UID/otel/0.log
        exclude:
          - /var/log/pods/monitoring_ipiece-monitoring-otel-agent-*/*/otel/*.log

        start_at: end
        include_file_path: true
        include_file_name: false

        operators:
          # 1. 시간 파싱 (Timestamp 문제 해결)
          - id: parser-cri
            type: regex_parser
            regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'

          # 2. 메타데이터 추출
          - id: extract_metadata_from_filepath
            type: regex_parser
            parse_from: attributes["log.file.path"]
            regex: '^.*/(?P<namespace>[^_]+)_(?P<pod_name>.+)_(?P<pod_uid>[a-f0-9\-]{36})/(?P<container_name>.+)/(?P<restart_count>\d+)\.log$'

          # 3. 메타데이터 이동
          - id: move-namespace
            type: move
            from: attributes["namespace"]
            to: resource["k8s.namespace.name"]
          - id: move-pod-name
            type: move
            from: attributes["pod_name"]
            to: resource["k8s.pod.name"]
          - id: move-pod-uid
            type: move
            from: attributes["pod_uid"]
            to: resource["k8s.pod.uid"]
          - id: move-container-name
            type: move
            from: attributes["container_name"]
            to: resource["k8s.container.name"]
          - id: move-restart-count
            type: move
            from: attributes["restart_count"]
            to: resource["k8s.container.restart_count"]

          # 4. 로그 본문 정리
          - id: clean-up-body
            type: move
            from: attributes["log"]
            to: body

      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512

      k8sattributes:
        # 🔥 여기! 대소문자 정확히 "serviceAccount" 여야 함
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid

      resourcedetection:
        detectors: [env, system]

      # Loki 라벨 힌트용 Resource Processor
      resource:
        attributes:
          - key: loki.resource.labels
            action: insert
            value: k8s.namespace.name, k8s.pod.name, k8s.container.name, k8s.node.name

    exporters:
      prometheusremotewrite:
        endpoint: "http://prometheus-operated.monitoring:9090/api/v1/write"
        tls:
          insecure: true

      loki:
        endpoint: "http://ipiece-loki.monitoring:3100/loki/api/v1/push"
        tls:
          insecure: true

      debug/logs:
        verbosity: detailed

    service:
      pipelines:
        metrics:
          receivers: [hostmetrics, kubeletstats, otlp]
          processors: [k8sattributes, batch, resourcedetection]
          exporters: [prometheusremotewrite]

        logs:
          receivers: [filelog, otlp]
          processors: [k8sattributes, resource, batch, resourcedetection]
          exporters: [loki, debug/logs]

  serviceAccount:
    create: true

  clusterRole:
    create: true
    rules:
      - apiGroups: [""]

        resources: ["nodes", "nodes/stats", "services", "endpoints", "pods", "namespaces", "nodes/proxy"]
        verbs: ["get", "watch", "list"]
      - apiGroups: ["apps"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["extensions"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
