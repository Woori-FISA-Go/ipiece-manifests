# ==========================================
# 1. Prometheus (메트릭 저장소 - EBS 사용)
# ==========================================
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      # OTel remote write 받기
      enableRemoteWriteReceiver: true
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      resources:
        requests:
          memory: 1Gi
        limits:
          memory: 2Gi

  grafana:
    enabled: true
    adminPassword: "admin"
    persistence:
      enabled: true
      storageClassName: gp3
      size: 10Gi

    # 🔥 Grafana에서 Loki를 기본 데이터소스로 붙이기
    additionalDataSources:
      - name: Loki
        type: loki
        # CHANGED: Loki 서비스 이름을 ipiece-loki 로 고정 (아래 loki-stack 설정과 매칭)
        url: http://ipiece-loki:3100/
        access: proxy

    # /grafana 서브패스로 노출
    env:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  nodeExporter:
    enabled: false

# ==========================================
# 2. Loki (로그 저장소 - S3 사용)
# ==========================================
loki-stack:
  promtail:
    enabled: false

  loki:
    enabled: true
    isDefault: false

    # CHANGED: Loki 리소스 이름을 ipiece-loki 로 고정
    # => Service 이름이 ipiece-loki (port 3100) 으로 생김
    fullnameOverride: ipiece-loki

    config:
      auth_enabled: false
      schema_config:
        configs:
          - from: 2024-01-01
            store: boltdb-shipper
            object_store: s3
            schema: v11
            index:
              prefix: index_
              period: 24h

      storage_config:
        aws:
          # CHANGED: 실제 S3 버킷 경로 형태로 수정
          #   - Region은 아래 region 필드에서 지정
          #   - 버킷 이름이 ipiece-loki-store 라고 했으니 이렇게 두는게 일반적
          s3: s3://ipiece-loki-store
          region: ap-northeast-2

    extraEnv:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: S3_AWS_SECRET_ACCESS_KEY

    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: s3
      retention_enabled: true

    limits_config:
      retention_period: 30d

# ==========================================
# 3. OTel Collector (EKS 내부 수집용)
# ==========================================
otel:
  mode: daemonset

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.91.0"

  # 환경변수 설정
  extraEnvs:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: K8S_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace

  # 볼륨 마운트 (로그 수집용)
  extraVolumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  extraVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

  config:
    receivers:
      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem: {}
          network: {}
          load: {}

      kubeletstats:
        auth_type: "serviceAccount"
        endpoint: "${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        collection_interval: 10s
        metric_groups:
          - node
          - pod

      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/monitoring_*/*/*.log
        start_at: beginning
        include_file_path: true
        include_file_name: false
        operators:
          - type: router
            id: get-format
            routes:
              - output: parser-docker
                expr: 'body matches "^\\{"'
              - output: parser-containerd
                expr: 'body matches "^[^ Z]+ "'
          - type: regex_parser
            id: parser-containerd
            regex: "^(?P<time>[^ ^Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: "%Y-%m-%dT%H:%M:%S.%LZ"
          - type: json_parser
            id: parser-docker
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: "%Y-%m-%dT%H:%M:%S.%LZ"
          - type: regex_parser
            id: extract_metadata_from_filepath
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]{36})\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$'
            parse_from: attributes["log.file.path"]

      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024

      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name

      resourcedetection:
        detectors: [env, system]

    exporters:
      # CHANGED: Prometheus remote write 엔드포인트를
      #   kube-prometheus-stack가 내부에서 만드는 고정 서비스인
      #   prometheus-operated 로 연결
      #
      # 이 서비스는 kube-prometheus-stack 설치 시 항상 같이 생기고,
      # remote write receiver도 여기서 열려 있음.
      prometheusremotewrite:
        endpoint: "http://prometheus-operated.monitoring:9090/api/v1/write"
        tls:
          insecure: true

      # CHANGED: Loki 엔드포인트를 우리가 fullnameOverride로 고정한
      #   ipiece-loki 서비스로 연결
      otlphttp/loki:
        endpoint: "http://ipiece-loki.monitoring:3100/otlp"
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [hostmetrics, kubeletstats, otlp]
          processors: [k8sattributes, batch, resourcedetection]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [filelog]
          processors: [k8sattributes, batch, resourcedetection]
          exporters: [otlphttp/loki]

  serviceAccount:
    create: true

  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources:
          [
            "nodes",
            "nodes/stats",
            "services",
            "endpoints",
            "pods",
            "namespaces",
            "nodes/proxy",
          ]
        verbs: ["get", "watch", "list"]
      - apiGroups: ["apps"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["extensions"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
