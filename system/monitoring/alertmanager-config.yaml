apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: ipiece-slack
  namespace: monitoring
  labels:
    alertmanagerConfig: ipiece
spec:
  route:
    groupBy: ['alertname', 'namespace']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h

    routes:
      - matchers:
          - name: alert_team
            value: app
            regex: false
        receiver: slack-app

      - matchers:
          - name: alert_team
            value: infra
            regex: false
          - name: infra
            value: eks
            regex: false
        receiver: slack-eks-infra

      - matchers:
          - name: alert_team
            value: infra
            regex: false
          - name: infra
            value: onprem
            regex: false
        receiver: slack-onprem-infra

    receiver: slack-main

  receivers:
    - name: slack-app
      slackConfigs:
        - apiURL:
            name: alertmanager-slack-app-webhook
            key: slack_api_url
          sendResolved: true

    - name: slack-eks-infra
      slackConfigs:
        - apiURL:
            name: alertmanager-slack-eks-webhook
            key: slack_api_url
          sendResolved: true

    - name: slack-onprem-infra
      slackConfigs:
        - apiURL:
            name: alertmanager-slack-onprem-webhook
            key: slack_api_url
          sendResolved: true

    - name: slack-main
      slackConfigs:
        - apiURL:
            name: alertmanager-slack-webhook
            key: slack_api_url
          sendResolved: true
