apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-ipiece-monitoring-kube-pro-alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: manual
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    
    route:
      receiver: slack-main
      group_by: ['alertname', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    
    receivers:
      - name: slack-main
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/slack_api_url
            channel: '#ipiece-alarm'
            send_resolved: true