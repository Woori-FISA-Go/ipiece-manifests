apiVersion: v1
kind: ServiceAccount
metadata:
  name: hpa-patcher
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hpa-patcher
  namespace: default
rules:
  # HPA를 조회(get)하고 수정(patch)할 수 있는 권한만 줍니다.
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hpa-patcher
  namespace: default
subjects:
  - kind: ServiceAccount
    name: hpa-patcher
    namespace: default
roleRef:
  kind: Role
  name: hpa-patcher
  apiGroup: rbac.authorization.k8s.io