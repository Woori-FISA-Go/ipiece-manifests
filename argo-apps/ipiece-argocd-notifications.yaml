apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ipiece-argocd-notifications
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Woori-FISA-Go/ipiece-manifests.git
    targetRevision: develop
    path: system/argocd-notifications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
