apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ipiece-aws-lb-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Woori-FISA-Go/ipiece-manifests.git
    targetRevision: develop
    path: system/aws-load-balancer-controller
    helm:
      skipCrds: false
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
