apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ipiece-scheduled-scaler
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Woori-FISA-Go/ipiece-manifests.git
    targetRevision: develop
    path: system/scheduled-scaler  # 크론잡 파일이 있는 경로
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true