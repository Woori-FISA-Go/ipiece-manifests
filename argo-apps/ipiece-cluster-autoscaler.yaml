# argo-apps/ipiece-cluster-autoscaler.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ipiece-cluster-autoscaler
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Woori-FISA-Go/ipiece-manifests.git
    targetRevision: develop
    path: system/cluster-autoscaler
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
