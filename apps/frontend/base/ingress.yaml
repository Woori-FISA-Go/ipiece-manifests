apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ipiece-frontend-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/group.name: ipiece
    
    # ✅ ExternalDNS가 이 호스트네임을 보고 Route53을 만듭니다.
    external-dns.alpha.kubernetes.io/hostname: ipiece.store

    # ✅ HTTP(80) + HTTPS(443) 리스너 둘 다 활성화
    #    → HTTP 절대 안 꺼짐, 기존처럼 계속 사용 가능
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'

    # ✅ ACM 인증서 ARN (ipiece.store)
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:235625001959:certificate/ad38efac-da2d-494f-9bcb-8db272d92577

    # ❌ 넣지 말 것: HTTP → HTTPS 강제 리다이렉트
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  ingressClassName: alb
  rules:
    # ✅ 호스트 명시
    - host: ipiece.store
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ipiece-frontend
                port:
                  number: 80
