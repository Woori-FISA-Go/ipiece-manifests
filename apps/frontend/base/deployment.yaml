apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipiece-frontend
  labels:
    app: ipiece-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ipiece-frontend
  template:
    metadata:
      labels:
        app: ipiece-frontend
    spec:
      # 🔽 워크로드 전용 노드
      nodeSelector:
        role: "workload"

      # 🔽 AZ / 노드 분산
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ipiece-frontend
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ipiece-frontend
      # 🔼
      containers:
        - name: ipiece-frontend
          # 🔥 [수정됨] Kustomize가 이 이름을 찾아서 ECR 주소로 바꿉니다.
          # 절대 여기에 긴 ECR 주소를 직접 적지 마세요!
          image: ipiece-frontend
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
