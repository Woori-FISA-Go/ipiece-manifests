apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: ipiece-frontend
    newName: 235625001959.dkr.ecr.ap-northeast-2.amazonaws.com/ipiece-frontend
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: ipiece-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
