apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# CI/CD 파이프라인에서 'kustomize edit set image' 명령어로 수정할 부분
images:
  - name: ipiece-frontend
    newName: ipiece-frontend
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: ipiece-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
