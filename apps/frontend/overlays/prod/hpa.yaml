apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ipiece-frontend
  namespace: ipiece-frontend-prod
  labels:
    app: ipiece-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ipiece-frontend

  # 🔹 기본 3개, 최대 10개
  minReplicas: 2
  maxReplicas: 10

  # 🔹 CPU 기준
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60  # 50 → 60

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100          # 최대 2배까지
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
