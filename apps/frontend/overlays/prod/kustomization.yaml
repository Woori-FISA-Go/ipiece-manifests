apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: ipiece-frontend
    newName: ipiece-frontend
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: ipiece-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2