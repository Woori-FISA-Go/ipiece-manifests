apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# CI/CD에서 이미지 태그 교체 대상
images:
  - name: ipiece-backend
    newName: ipiece-backend
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: ipiece-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
