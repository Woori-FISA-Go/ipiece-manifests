apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ipiece-backend-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: ipiece
    alb.ingress.kubernetes.io/group.order: "20"
    alb.ingress.kubernetes.io/healthcheck-path: /api/healthz
    alb.ingress.kubernetes.io/load-balancer-attributes: "idle_timeout.timeout_seconds=3600"
    alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=3600"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:235625001959:certificate/ad38efac-da2d-494f-9bcb-8db272d92577
    external-dns.alpha.kubernetes.io/hostname: ipiece.store
spec:
  ingressClassName: alb
  rules:
    - host: ipiece.store
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: ipiece-server
                port:
                  number: 80
          - path: /api/actuator/
            pathType: Prefix
            backend:
              service:
                name: ipiece-server
                port:
                  number: 80
