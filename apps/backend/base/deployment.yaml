apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipiece-server
  labels:
    app: ipiece-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ipiece-server
  template:
    metadata:
      labels:
        app: ipiece-server
    spec:
      serviceAccountName: ipiece-backend-sa
      imagePullSecrets:
        - name: ecr-secret

      # ===========================================
      # 1) OTel Java Agent 다운로드 initContainer
      # ===========================================
      initContainers:
        - name: download-otel-agent
          image: curlimages/curl:latest
          command: ["sh", "-c"]
          args:
            - >
              curl -L https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.7.0/opentelemetry-javaagent.jar
              -o /otel/opentelemetry-javaagent.jar ;
          volumeMounts:
            - name: otel-agent
              mountPath: /otel

      containers:
        - name: ipiece-server
          image: 235625001959.dkr.ecr.ap-northeast-2.amazonaws.com/ipiece-server:latest
          ports:
            - containerPort: 8080
              name: http

          # ===========================================
          # 2) Java 실행 override (가장 중요!!)
          # ===========================================
          command: ["java"]
          args:
            - "-javaagent:/otel/opentelemetry-javaagent.jar"
            - "-jar"
            - "/app/app.jar"
          # ===========================================

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/api"

            # ===========================================
            # 3) OTel Exporter 설정
            # ===========================================
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://ipiece-monitoring-otel-agent.monitoring.svc.cluster.local:4317"

            - name: OTEL_SERVICE_NAME
              value: "ipiece-server"

            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=ipiece-server,service.namespace=backend,deployment.environment=prod"

            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"

          envFrom:
            - secretRef:
                name: ipiece-backend-env

          volumeMounts:
            - name: otel-agent
              mountPath: /otel

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3

      volumes:
        - name: otel-agent
          emptyDir: {}
