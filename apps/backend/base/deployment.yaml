apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipiece-server
  labels:
    app: ipiece-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ipiece-server
  template:
    metadata:
      labels:
        app: ipiece-server
    spec:
      serviceAccountName: ipiece-backend-sa
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: ipiece-server
        image: 235625001959.dkr.ecr.ap-northeast-2.amazonaws.com/ipiece-server:latest
        ports:
        - containerPort: 8080
          name: http

        # ----------------------------
        # 🔥 여기부터 OTel 핵심 부분
        # ----------------------------
        args:
          - "-javaagent:/otel/opentelemetry-javaagent.jar"

        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SERVER_SERVLET_CONTEXT_PATH
          value: "/api"

        # OTel Service Name
        - name: OTEL_SERVICE_NAME
          value: "ipiece-server"

        # OTel Collector Endpoint
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://ipiece-monitoring-otel.monitoring.svc.cluster.local:4317"

        # Resource Attributes
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.namespace=ipiece,service.name=ipiece-server,deployment.environment=prod"

        # Metrics + Traces 활성화
        - name: OTEL_METRICS_EXPORTER
          value: "otlp"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_LOGS_EXPORTER
          value: "none"

        envFrom:
        - secretRef:
            name: ipiece-backend-env

        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        volumeMounts:
        - name: otel-agent
          mountPath: /otel

        livenessProbe:
          httpGet:
            path: /api/healthz
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /api/healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 3

      volumes:
      - name: otel-agent
        configMap:
          name: otel-javaagent
          items:
            - key: opentelemetry-javaagent.jar
              path: opentelemetry-javaagent.jar
