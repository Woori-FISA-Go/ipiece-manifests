apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipiece-server
  labels:
    app: ipiece-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ipiece-server
  template:
    metadata:
      labels:
        app: ipiece-server
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: ipiece-server
        image: 235625001959.dkr.ecr.ap-northeast-2.amazonaws.com/ipiece-server:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        envFrom:
        - secretRef:
            # ✅ [수정됨 1] CI/CD가 만들어주는 시크릿 이름과 일치시킴
            name: ipiece-backend-env
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        # ✅ [수정됨 2] 헬스체크 경로를 실제 자바 코드(/healthz)에 맞춤
        # 이게 틀리면 파드가 계속 재부팅됩니다.
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 3