apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipiece-server
  labels:
    app: ipiece-server
spec:
  replicas: 4
  selector:
    matchLabels:
      app: ipiece-server
  template:
    metadata:
      labels:
        app: ipiece-server
    spec:
      serviceAccountName: ipiece-backend-sa
      imagePullSecrets:
        - name: ecr-secret

      initContainers:
        - name: download-otel-agent
          image: curlimages/curl:latest
          command: ["sh", "-c"]
          args:
            - >
              curl -L https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.7.0/opentelemetry-javaagent.jar
              -o /otel/opentelemetry-javaagent.jar ;
          volumeMounts:
            - name: otel-agent
              mountPath: /otel

      containers:
        - name: ipiece-server
          image: 235625001959.dkr.ecr.ap-northeast-2.amazonaws.com/ipiece-server:latest
          ports:
            - containerPort: 8080
              name: http

          command: ["java"]
          args:
            - "-javaagent:/otel/opentelemetry-javaagent.jar"
            - "-jar"
            - "/app/app.jar"

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/api"

            # ================================
            #   OTEL Exporter (Gateway Only)
            # ================================
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://ipiece-monitoring-otel-collector-gateway.monitoring.svc.cluster.local:4317"

            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"

            - name: OTEL_SERVICE_NAME
              value: "ipiece-server"

            - name: OTEL_TRACES_EXPORTER
              value: "otlp"

            - name: OTEL_METRICS_EXPORTER
              value: "otlp"

            - name: OTEL_LOGS_EXPORTER
              value: "otlp"

            - name: KUBERNETES_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=ipiece-server,service.namespace=backend,deployment.environment=prod,k8s.node.name=$(KUBERNETES_NODE_NAME)"

          envFrom:
            - secretRef:
                name: ipiece-backend-env

          volumeMounts:
            - name: otel-agent
              mountPath: /otel

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          # 🟢 앱이 완전히 뜰 때까지는 liveness/readiness 체크 안 하도록
          startupProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 30   # 최대 150초까지 기다려줌

          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 40   # 30 → 40으로 살짝 여유
            periodSeconds: 5
            failureThreshold: 3

      volumes:
        - name: otel-agent
          emptyDir: {}
