apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipiece-server
  labels:
    app: ipiece-server
spec:
  replicas: 6
  selector:
    matchLabels:
      app: ipiece-server
  template:
    metadata:
      labels:
        app: ipiece-server
    spec:
      serviceAccountName: ipiece-backend-sa
      imagePullSecrets:
        - name: ecr-secret

      # 🔽 워크로드 전용 노드로 보내기
      nodeSelector:
        role: "workload"

      # 🔽 AZ / 노드 분산
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ipiece-server
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ipiece-server
      # 🔼

      initContainers:
        - name: download-otel-agent
          image: curlimages/curl:latest
          command: ["sh", "-c"]
          args:
            - >
              curl -L https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.7.0/opentelemetry-javaagent.jar
              -o /otel/opentelemetry-javaagent.jar ;
          volumeMounts:
            - name: otel-agent
              mountPath: /otel

      containers:
        - name: ipiece-server
          image: 235625001959.dkr.ecr.ap-northeast-2.amazonaws.com/ipiece-server:latest
          ports:
            - containerPort: 8080
              name: http

          command: ["java"]
          args:
            - "-javaagent:/otel/opentelemetry-javaagent.jar"
            - "-jar"
            - "/app/app.jar"

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/api"

            # ================================
            #   OTEL Exporter (Gateway Only)
            # ================================
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://ipiece-monitoring-otel-collector-gateway.monitoring.svc.cluster.local:4317"

            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"

            - name: OTEL_SERVICE_NAME
              value: "ipiece-server"

            - name: OTEL_TRACES_EXPORTER
              value: "otlp"

            - name: OTEL_METRICS_EXPORTER
              value: "otlp"

            - name: OTEL_LOGS_EXPORTER
              value: "otlp"

            - name: KUBERNETES_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=ipiece-server,service.namespace=backend,deployment.environment=prod,k8s.node.name=$(KUBERNETES_NODE_NAME)"

          envFrom:
            - secretRef:
                name: ipiece-backend-env

          volumeMounts:
            - name: otel-agent
              mountPath: /otel

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          # 🟢 부팅 + 부하시 너무 예민하게 죽지 않도록 완화된 프로브 설정
          startupProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3      # 1초 → 3초 (부하 시 여유)
            failureThreshold: 60   # 30 → 60 (최대 5분까지 부팅 기다려줌)

          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 120  # 60 → 120 (충분히 자리 잡고부터 체크)
            periodSeconds: 20         # 10 → 20
            timeoutSeconds: 3         # 1초 → 3초
            failureThreshold: 5       # 3 → 5 (몇 번 연속 실패해야 진짜 죽임)

          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 60   # 40 → 60
            periodSeconds: 5
            timeoutSeconds: 3         # 1초 → 3초
            failureThreshold: 5       # 3 → 5 (잠깐 느려져도 바로 0/1 안 되게)

      volumes:
        - name: otel-agent
          emptyDir: {}
