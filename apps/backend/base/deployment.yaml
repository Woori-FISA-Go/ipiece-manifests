apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipiece-server
  labels:
    app: ipiece-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ipiece-server
  template:
    metadata:
      labels:
        app: ipiece-server
    spec:
      serviceAccountName: ipiece-backend-sa # S3 접근을 위한 추가
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: ipiece-server
        image: 235625001959.dkr.ecr.ap-northeast-2.amazonaws.com/ipiece-server:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        # ✅ [추가됨] 백엔드 애플리케이션의 기본 경로를 /api로 설정
        # 이제 백엔드는 모든 요청이 /api로 시작한다고 인식합니다.
        - name: SERVER_SERVLET_CONTEXT_PATH
          value: "/api"
        envFrom:
        - secretRef:
            name: ipiece-backend-env
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        # ✅ [수정됨] Context Path가 /api로 설정되었으므로, 헬스체크 주소도 /api가 붙어야 함
        # 기존 /healthz -> /api/healthz 로 변경
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 3